name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest ruff mypy
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy translator.py machine.py isa.py

      - name: Pytest (tests)
        run: pytest tests/ -v
